<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0c0d" />
    <meta
      name="description"
      content="LRDC-TV — plataforma de streaming dedicada exclusivamente a una serie."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>LRDC-TV</title>
    <style>
      /* Estilos críticos mínimos: se aplican antes de que cargue el
         bundle, para que el fallback de arranque nunca se vea sin estilo. */
      html, body { background: #0b0c0d; margin: 0; }
      .boot-fallback {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        color: #9a9ca3;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!--
        Fallback estático: si por alguna razón el bundle de React no
        llega a montar (fallo de red, error de JS muy temprano, etc.)
        el usuario ve esto en vez de una pantalla en blanco.
      -->
      <div class="boot-fallback">
        <p>Cargando LRDC-TV…</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
